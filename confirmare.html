<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmare participare</title>
  <style>
    :root {
      --text: #ffffff;
      --accent: #b78a4a;
      --accent-dark: #9f743b;
      --danger: #b84b4b;
      --danger-dark: #983d3d;
      --stroke: rgba(255, 255, 255, 0.55);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: url("images/photo.jpg") center/cover no-repeat fixed;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    /* CARD COMPLET TRANSPARENT */
    .card {
      width: 100%;
      max-width: 560px;
      background: transparent;
      border: 1px solid var(--stroke);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      backdrop-filter: none;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
      text-align: center;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.45);
    }

    /* INPUTURI OPACE (NU TRANSPARENTE) */
    input[type="text"],
    input[type="number"] {
      width: 100%;
      border: 1px solid #cfcfcf;
      background: #ffffff;
      color: #222;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 15px;
      outline: none;
    }

    input::placeholder { color: #777; }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(183, 138, 74, 0.25);
    }

    .section-title {
      font-weight: 700;
      margin: 18px 0 8px;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.45);
    }

    .radio-group {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
    }

    /* SELECTII OPACE (NU TRANSPARENTE) */
    .radio-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #ffffff;
      border: 1px solid #d9d9d9;
      border-radius: 10px;
      padding: 10px 12px;
      color: #222;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.04s ease, opacity 0.2s ease, background 0.2s ease;
    }

    button:active { transform: translateY(1px); }

    .btn-yes { background: var(--accent); }
    .btn-yes:hover { background: var(--accent-dark); }

    .btn-no { background: var(--danger); }
    .btn-no:hover { background: var(--danger-dark); }

    .status {
      margin-top: 14px;
      font-size: 14px;
      min-height: 20px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.45);
    }

    .ok { color: #d7ffe2; }
    .err { color: #ffd9df; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Confirmare participare</h1>

    <div class="field">
      <label for="nume">Nume și prenume</label>
      <input id="nume" type="text" placeholder="Ex: Popescu Ana Maria" />
    </div>

    <div class="section-title">Număr persoane</div>
    <div class="radio-group">
      <label class="radio-item">
        <input type="radio" name="persoane" value="Vin singur" checked />
        <span>Vin singur</span>
      </label>

      <label class="radio-item">
        <input type="radio" name="persoane" value="Vin însoțit(ă)" />
        <span>Vin însoțit(ă)</span>
      </label>
    </div>

    <div class="field">
      <label for="nrCopii">Meniu copii (număr copii)</label>
      <input id="nrCopii" type="number" min="0" step="1" placeholder="Ex: 2" />
    </div>

    <div class="actions">
      <button class="btn-yes" id="btnConfirm" type="button">Confirm</button>
      <button class="btn-no" id="btnRefuz" type="button">Nu pot ajunge</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycb....../exec";

    const numeEl = document.getElementById("nume");
    const nrCopiiEl = document.getElementById("nrCopii");
    const statusEl = document.getElementById("status");
    const btnConfirm = document.getElementById("btnConfirm");
    const btnRefuz = document.getElementById("btnRefuz");

    function getPersoaneValue() {
      const selected = document.querySelector('input[name="persoane"]:checked');
      return selected ? selected.value : "";
    }

    function setStatus(msg, ok = true) {
      statusEl.textContent = msg;
      statusEl.className = "status " + (ok ? "ok" : "err");
    }

    async function sendResponse(raspuns) {
      const nume = numeEl.value.trim();
      const persoane = getPersoaneValue();
      const nrCopii = nrCopiiEl.value ? Number(nrCopiiEl.value) : "";

      if (!nume) {
        setStatus("Trimitere eșuată, contactați direct prin telefon la numerele din invitație", false);
        return;
      }

      if (nrCopii !== "" && (isNaN(nrCopii) || nrCopii < 0)) {
        setStatus("Trimitere eșuată, contactați direct prin telefon la numerele din invitație", false);
        return;
      }

      const payload = {
        numePrenume: nume,
        raspuns: raspuns,
        numarPersoane: persoane,
        meniuCopii: nrCopii === "" ? "" : nrCopii
      };

      try {
        btnConfirm.disabled = true;
        btnRefuz.disabled = true;

        const res = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const raw = await res.text();
        let data = {};
        try {
          data = JSON.parse(raw);
        } catch (_) {
          data = { success: false };
        }

        if (!data.success) {
          throw new Error("save_failed");
        }

        setStatus("Trimitere efectuată", true);
        numeEl.value = "";
        nrCopiiEl.value = "";
        document.querySelector('input[name="persoane"][value="Vin singur"]').checked = true;
      } catch (err) {
        setStatus("Trimitere eșuată, contactați direct prin telefon la numerele din invitație", false);
      } finally {
        btnConfirm.disabled = false;
        btnRefuz.disabled = false;
      }
    }

    btnConfirm.addEventListener("click", () => sendResponse("Confirm"));
    btnRefuz.addEventListener("click", () => sendResponse("Nu pot ajunge"));
  </script>
</body>
</html>
